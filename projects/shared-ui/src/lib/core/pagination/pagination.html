<div class="org-pagination">
  <div [class]="mergeClasses('org-pagination-container', class())">
    <!-- Result text -->
    <div class="org-pagination-result-text">
      {{ resultText() }}
    </div>

    <!-- Navigation controls -->
    <div class="org-pagination-nav">
      <!-- Previous button -->
      <org-button
        size="small"
        orgColor="neutral"
        icon="caret-left"
        [disabled]="disabled() || !hasPrevious()"
        (clicked)="previousPage()"
        class="min-w-8"
      />

      <!-- Page numbers -->
      @for (page of visiblePages(); track page.value || 'ellipsis-' + $index) {
        @if (page.type === 'ellipsis') {
          <span class="org-pagination-ellipsis">...</span>
        } @else {
          <org-button
            size="small"
            [orgColor]="page.isActive ? 'brand' : 'neutral'"
            [disabled]="disabled()"
            (clicked)="goToPage(page.value!)"
            class="min-w-8"
          >
            {{ page.value }}
          </org-button>
        }
      }

      <!-- Next button -->
      <org-button
        size="small"
        orgColor="neutral"
        icon="caret-right"
        [disabled]="disabled() || !hasNext()"
        (clicked)="nextPage()"
        class="min-w-8"
      />
    </div>

    <!-- Items per page selector -->
    <div class="org-pagination-items-per-page">
      <span class="org-pagination-items-per-page-label">Items per page:</span>
      <select
        class="org-pagination-select"
        [disabled]="disabled()"
        (change)="setItemsPerPage(+$any($event.target).value)"
      >
        @for (option of itemsPerPageOptions(); track option) {
          <option [value]="option" [selected]="option === activeItemsPerPage()">{{ option }}</option>
        }
      </select>
    </div>
  </div>
</div>
