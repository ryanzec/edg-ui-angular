@if (authenticationStore.hasInitialized() === false) {
  <main>
    <div>
      <!-- loading this as hidden so the the theme is properly initialized while the application is loading -->
      <org-ui-theme-switcher class="hidden"></org-ui-theme-switcher>
      <div>Loading...</div>
    </div>
  </main>
}
@if (authenticationStore.hasInitialized()) {
  @if (authenticationStore.isAuthenticated()) {
    <a routerLink="/home">Home</a>
    <a routerLink="/users">Users</a>
    <a routerLink="/bad-link">Bad Link</a>
  }
  <main>
    <div>
      <div>
        <div class="flex">
          <org-ui-theme-switcher></org-ui-theme-switcher>
        </div>
      </div>
      <div class="divider" role="separator" aria-label="Divider"></div>
      <router-outlet />
    </div>
  </main>
}
