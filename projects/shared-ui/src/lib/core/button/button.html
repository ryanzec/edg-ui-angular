<button
  [type]="type()"
  [disabled]="isDisabled()"
  [class]="
    mergeClasses(
      'org-button',
      {
        'org-button-size-sm': !isIconOnly() && size() === 'sm',
        'org-button-size-base': !isIconOnly() && size() === 'base',
        'org-button-size-lg': !isIconOnly() && size() === 'lg',
        'org-button-icon-only-sm': isIconOnly() && size() === 'sm',
        'org-button-icon-only-base': isIconOnly() && size() === 'base',
        'org-button-icon-only-lg': isIconOnly() && size() === 'lg',
        'org-button-disabled': isDisabled(),
        'org-button-primary-filled': color() === 'primary',
        'org-button-primary-ghost': color() === 'primary' && variant() === 'ghost',
        'org-button-secondary-filled': color() === 'secondary',
        'org-button-secondary-ghost': color() === 'secondary' && variant() === 'ghost',
        'org-button-neutral-filled': color() === 'neutral',
        'org-button-neutral-ghost': color() === 'neutral' && variant() === 'ghost',
        'org-button-safe-filled': color() === 'safe',
        'org-button-safe-ghost': color() === 'safe' && variant() === 'ghost',
        'org-button-info-filled': color() === 'info',
        'org-button-info-ghost': color() === 'info' && variant() === 'ghost',
        'org-button-caution-filled': color() === 'caution',
        'org-button-caution-ghost': color() === 'caution' && variant() === 'ghost',
        'org-button-warning-filled': color() === 'warning',
        'org-button-warning-ghost': color() === 'warning' && variant() === 'ghost',
        'org-button-danger-filled': color() === 'danger',
        'org-button-danger-ghost': color() === 'danger' && variant() === 'ghost',
      }
    )
  "
  (click)="handleClick()"
  (mousedown)="handleMouseDown()"
  (mouseup)="handleMouseUp()"
  (mouseleave)="handleMouseLeave()"
>
  @if (preIcon() && !isIconOnly() && !isLoading()) {
    <org-icon [name]="preIcon()!" [size]="size()" />
  }

  @if (isLoading()) {
    <org-loading-spinner [size]="size()" />
  }

  @if (icon()) {
    <org-icon [name]="icon()!" [size]="size()" />
  } @else {
    <ng-content />
  }

  @if (postIcon() && !isIconOnly() && !isLoading()) {
    <org-icon [name]="postIcon()!" [size]="size()" />
  }
</button>
