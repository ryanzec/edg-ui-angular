<mat-card class="login-card">
  <mat-card-header>
    <mat-card-title class="text-center">Sign In</mat-card-title>
    <mat-card-subtitle class="text-center">Please enter your credentials to continue</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="flex flex-col gap-1">
      <!-- Email Field -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="Enter your email" autocomplete="email" />
        <mat-icon matPrefix>email</mat-icon>
        @if (getFieldError('email')) {
          <mat-error>{{ getFieldError('email') }}</mat-error>
        }
      </mat-form-field>

      <!-- Password Field -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
        <mat-icon matPrefix>lock</mat-icon>
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="'Hide password'"
          [attr.aria-pressed]="hidePassword"
        >
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>

        @if (getFieldError('password')) {
          <mat-error>{{ getFieldError('password') }}</mat-error>
        }
      </mat-form-field>

      <!-- Submit Button -->
      <button matButton color="primary" type="submit" class="full-width submit-button">Sign In</button>
    </form>
  </mat-card-content>
</mat-card>
