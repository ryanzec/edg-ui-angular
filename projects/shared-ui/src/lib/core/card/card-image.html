<span
  [class]="
    mergeClasses(
      'org-card-image-container',
      {
        'full-width': this.fullWidth(),
      },
      class()
    )
  "
>
  @if (shouldUseOptimizedImage()) {
    <img
      [ngSrc]="src()"
      [alt]="alt()"
      [width]="width()!"
      [height]="height()!"
      [priority]="priority()"
      [class]="
        mergeClasses('org-card-image', {
          'full-width': fullWidth(),
        })
      "
    />
  } @else {
    <img
      [src]="src()"
      [alt]="alt()"
      [class]="
        mergeClasses('org-card-image', {
          'full-width': fullWidth(),
        })
      "
    />
  }
</span>
