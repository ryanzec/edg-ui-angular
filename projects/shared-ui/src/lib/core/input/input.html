<div class="org-input inline-block w-full">
  <div [class]="containerClasses()">
    @for (item of inlineItems(); track item.id) {
      <org-tag
        orgColor="brand"
        variant="weak"
        [removable]="!!(item.removable && !isDisabled() && !isReadonly())"
        (removed)="handleInlineItemRemove(item)"
      >
        {{ item.label }}
      </org-tag>
    }
    @if (hasPreIcon()) {
      <button
        type="button"
        class="inline-flex org-input-icon"
        [class.clickable]="isPreIconClickable()"
        [class.disabled]="isDisabled()"
        [class.readonly]="isReadonly()"
        (click)="handlePreIconClick()"
        [disabled]="isDisabled() || isReadonly()"
        [attr.aria-label]="'Pre icon'"
      >
        <org-icon [name]="preIcon()!" size="base" />
      </button>
    }
    <input
      #inputElement
      class="org-input-element"
      [type]="currentInputType()"
      [value]="value()"
      [placeholder]="placeholder()"
      [disabled]="isDisabled()"
      [readonly]="isReadonly()"
      [attr.aria-invalid]="isInvalid()"
      [attr.aria-describedby]="hasValidationMessage() ? 'validation-message' : null"
      [attr.autofocus]="autoFocus() || null"
      (input)="handleInputChange($event)"
    />
    @if (hasPostIcon()) {
      <button
        type="button"
        class="inline-flex org-input-icon"
        [class.clickable]="showPasswordToggle() || isPostIconClickable()"
        [class.disabled]="isDisabled()"
        [class.readonly]="isReadonly()"
        (click)="handlePostIconClick()"
        [disabled]="isDisabled() || isReadonly()"
        [attr.aria-label]="
          showPasswordToggle() && type() === 'password'
            ? showPassword()
              ? 'Hide password'
              : 'Show password'
            : 'Post icon'
        "
      >
        <org-icon [name]="currentPostIcon()!" size="base" />
      </button>
    }
  </div>
  <div
    id="validation-message"
    class="org-input-validation-message"
    [class.visible]="hasValidationMessage()"
    [class.hidden]="!hasValidationMessage()"
    role="alert"
    aria-live="polite"
  >
    {{ validationMessage() || 'No validation message' }}
  </div>
</div>
