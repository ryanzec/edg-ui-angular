<div [class]="mergeClasses('org-textarea', hostClasses())">
  <div [class]="containerClasses()">
    @for (item of inlineItems(); track item.id) {
      <org-tag
        orgColor="brand"
        variant="weak"
        [removable]="!!(item.removable && !isDisabled() && !isReadonly())"
        (removed)="handleInlineItemRemove(item)"
      >
        {{ item.label }}
      </org-tag>
    }
    @if (hasPreIcon()) {
      <button
        type="button"
        class="inline-flex org-textarea-icon"
        [class.clickable]="isPreIconClickable()"
        [class.disabled]="isDisabled()"
        [class.readonly]="isReadonly()"
        [class.align-start]="preIconAlignment() === 'start'"
        [class.align-center]="preIconAlignment() === 'center'"
        [class.align-end]="preIconAlignment() === 'end'"
        (click)="handlePreIconClick()"
        [disabled]="isDisabled() || isReadonly()"
        [attr.aria-label]="'Pre icon'"
      >
        <org-icon [name]="preIcon()!" size="base" />
      </button>
    }
    <textarea
      #textareaElement
      class="org-textarea-element"
      [value]="value()"
      [placeholder]="placeholder()"
      [disabled]="isDisabled()"
      [readonly]="isReadonly()"
      [rows]="rows()"
      [attr.aria-invalid]="isInvalid()"
      [attr.aria-describedby]="hasValidationMessage() ? 'validation-message' : null"
      [attr.autofocus]="autoFocus() || null"
      (input)="handleInputChange($event)"
      (keydown)="handleKeyDown($event)"
    ></textarea>
    @if (hasPostIcon()) {
      <button
        type="button"
        class="inline-flex org-textarea-icon"
        [class.clickable]="isPostIconClickable()"
        [class.disabled]="isDisabled()"
        [class.readonly]="isReadonly()"
        [class.align-start]="postIconAlignment() === 'start'"
        [class.align-center]="postIconAlignment() === 'center'"
        [class.align-end]="postIconAlignment() === 'end'"
        (click)="handlePostIconClick()"
        [disabled]="isDisabled() || isReadonly()"
        [attr.aria-label]="'Post icon'"
      >
        <org-icon [name]="postIcon()!" size="base" />
      </button>
    }
  </div>
  <div
    id="validation-message"
    class="org-textarea-validation-message"
    [class.visible]="hasValidationMessage()"
    [class.hidden]="!hasValidationMessage()"
    role="alert"
    aria-live="polite"
  >
    {{ validationMessage() || 'No validation message' }}
  </div>
</div>
