<org-card class="login-card">
  <org-card-header title="Sign In" subtitle="Please enter your credentials to continue" />
  <org-card-content>
    <form orgGroupElements flexDirection="col" [formGroup]="loginForm" (ngSubmit)="login()">
      <!-- @todo(!) create component for this -->
      <div class="org-label" class="w-full">
        <!-- @todo(!) create component for this -->
        <label for="email">Email</label>
        <org-input
          data-testid="email-input"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          autocomplete="email"
        />
        <org-icon matPrefix name="envelope" />
        @if (getFieldError('email')) {
          <!-- @todo(!) create component for this -->
          <div>{{ getFieldError('email') }}</div>
        }
      </div>
      <div class="w-full">
        <!-- @todo(!) create component for this -->
        <label for="password">Password</label>
        <org-input
          data-testid="password-input"
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
        <org-icon name="lock-key" />
        <org-button
          data-testid="password-toggle-button"
          orgColor="brand"
          type="button"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="'Show password'"
          [attr.aria-pressed]="showPassword"
        >
          <org-icon [name]="showPassword ? 'eye' : 'eye-slash'" />
        </org-button>

        @if (getFieldError('password')) {
          <!-- @todo(!) create component for this -->
          <div>{{ getFieldError('password') }}</div>
        }
      </div>

      <button data-testid="submit-button" matButton color="primary" type="submit" class="w-full submit-button">
        Sign In
      </button>
    </form>
  </org-card-content>
</org-card>
