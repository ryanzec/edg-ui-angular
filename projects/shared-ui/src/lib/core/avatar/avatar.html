<div
  [class]="mergeClasses('org-avatar flex items-center gap-2', class())"
  (click)="handleMouseClick($event)"
  (keydown.enter)="handleKeyboardClick($event)"
  (keydown.space)="handleKeyboardClick($event)"
  tabindex="0"
  role="button"
>
  <div
    [class]="
      mergeClasses(
        'org-avatar-circle flex items-center justify-center rounded-full overflow-hidden text-avatar-text bg-avatar-background',
        {
          'w-[24px] h-[24px] text-xs': size() === 'sm',
          'w-[32px] h-[32px] text-sm': size() === 'base',
          'w-[48px] h-[48px] text-base': size() === 'lg',
        }
      )
    "
  >
    @if (shouldShowImage()) {
      <img [src]="imageSrc()" [alt]="label() || ''" class="w-full h-full object-cover" (error)="handleImageError()" />
    } @else if (initials()) {
      <span class="font-medium">{{ initials() }}</span>
    }
  </div>

  @if (label() || subLabel()) {
    <div class="flex flex-col">
      @if (label()) {
        <span class="text-sm font-medium text-text">{{ label() }}</span>
      }
      @if (subLabel()) {
        <span class="text-xs text-text-subtle">{{ subLabel() }}</span>
      }
    </div>
  }
</div>
