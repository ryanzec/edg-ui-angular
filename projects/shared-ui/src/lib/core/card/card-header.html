<div [class]="mergeClasses('org-card-header', class())">
  @if (hasTitle() || hasSubtitle()) {
    <div class="org-card-header-content">
      @if (hasTitle()) {
        <h3 class="org-card-title">{{ title() }}</h3>
      }
      @if (hasSubtitle()) {
        <p class="org-card-subtitle">{{ subtitle() }}</p>
      }
    </div>
  }
  <ng-content />
</div>
