<mat-card class="login-card">
  <mat-card-header>
    <mat-card-title class="text-center">Sign In</mat-card-title>
    <mat-card-subtitle class="text-center">Please enter your credentials to continue</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <form orgFormFields [formGroup]="loginForm" (ngSubmit)="login()">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Email</mat-label>
        <input
          data-testid="email-input"
          matInput
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          autocomplete="email"
        />
        <mat-icon matPrefix>email</mat-icon>
        @if (getFieldError('email')) {
          <mat-error>{{ getFieldError('email') }}</mat-error>
        }
      </mat-form-field>
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input
          data-testid="password-input"
          matInput
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
        <mat-icon matPrefix>lock</mat-icon>
        <button
          data-testid="password-toggle-button"
          mat-icon-button
          matSuffix
          type="button"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="'Show password'"
          [attr.aria-pressed]="showPassword"
        >
          <mat-icon>{{ showPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
        </button>

        @if (getFieldError('password')) {
          <mat-error>{{ getFieldError('password') }}</mat-error>
        }
      </mat-form-field>

      <button data-testid="submit-button" matButton color="primary" type="submit" class="w-full submit-button">
        Sign In
      </button>
    </form>
  </mat-card-content>
</mat-card>
